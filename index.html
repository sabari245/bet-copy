<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bet Copy Buttons</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #09090b;
      --foreground: #fafafa;
      --muted: #a1a1aa;
      --card: #18181b;
      --card-border: #27272a;
      --button: #fafafa;
      --button-text: #09090b;
      --button-hover: #e4e4e7;
      --danger: #ef4444;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(39, 39, 42, 0.8), transparent 35%),
        var(--background);
      color: var(--foreground);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(92vw, 680px);
      padding: 32px 20px;
    }

    .header {
      margin-bottom: 24px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (max-width: 420px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .copy-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--card-border);
      border-radius: 14px;
      background: rgba(24, 24, 27, 0.82);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
      cursor: pointer;
      transition: border-color .15s ease, background .15s ease;
    }

    .copy-card:hover {
      border-color: rgba(250, 250, 250, .18);
      background: rgba(30, 30, 33, 0.92);
    }

    .copy-card:active {
      background: rgba(40, 40, 43, 0.95);
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 15px;
      color: var(--foreground);
      white-space: nowrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 13px;
      background: var(--button);
      color: var(--button-text);
      font-weight: 600;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease;
    }

    button:hover {
      background: var(--button-hover);
    }

    button:active {
      transform: scale(0.97);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(360px, calc(100vw - 36px));
      padding: 12px 14px;
      border: 1px solid var(--card-border);
      border-radius: 12px;
      background: #18181b;
      color: var(--foreground);
      font-size: 14px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .38);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      border-color: rgba(34, 197, 94, .4);
    }

    .toast.error {
      border-color: rgba(239, 68, 68, .45);
    }

    footer {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <section class="header">
      <h1>Bet Copier</h1>
      <p>Click a button to copy the bet command instantly.</p>
    </section>

    <section class="grid" aria-label="Bet copy buttons">
      <div class="copy-card" data-copy="$bet 1"><code>$bet 1</code><button>Copy</button></div>
      <div class="copy-card" data-copy="$bet 2"><code>$bet 2</code><button>Copy</button></div>
      <div class="copy-card" data-copy="$bet 4"><code>$bet 4</code><button>Copy</button></div>
      <div class="copy-card" data-copy="$bet 8"><code>$bet 8</code><button>Copy</button></div>
      <div class="copy-card" data-copy="$bet 16"><code>$bet 16</code><button>Copy</button></div>
      <div class="copy-card" data-copy="$bet 32"><code>$bet 32</code><button>Copy</button></div>
      <div class="copy-card" data-copy="$bet 64"><code>$bet 64</code><button>Copy</button></div>
      <div class="copy-card" data-copy="$bet 128"><code>$bet 128</code><button>Copy</button></div>
      <div class="copy-card" data-copy="$bet 256"><code>$bet 256</code><button>Copy</button></div>
      <div class="copy-card" data-copy="$bet 512"><code>$bet 512</code><button>Copy</button></div>
      <div class="copy-card" data-copy="$bet 1024"><code>$bet 1024</code><button>Copy</button></div>
      <div class="copy-card" data-copy="$bet 2048"><code>$bet 2048</code><button>Copy</button></div>
      <div class="copy-card" data-copy="$bet 4096"><code>$bet 4096</code><button>Copy</button></div>
    </section>

    <footer>Minimal dark UI · Copy-ready</footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const toast = document.getElementById("toast");
    let toastTimer;

    function showToast(message, type = "success") {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.className = `toast show ${type}`;
      toastTimer = setTimeout(() => {
        toast.className = "toast";
      }, 1800);
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.style.position = "fixed";
          textarea.style.opacity = "0";
          document.body.appendChild(textarea);
          textarea.focus();
          textarea.select();
          const copied = document.execCommand("copy");
          document.body.removeChild(textarea);
          if (!copied) throw new Error("Copy command failed");
        }

        showToast(`Copied: ${text}`, "success");
      } catch (error) {
        showToast("Copy failed. Please try again.", "error");
      }
    }

    document.querySelectorAll(".copy-card").forEach((card) => {
      card.addEventListener("click", () => copyText(card.dataset.copy));
    });
  </script>
</body>
</html>
